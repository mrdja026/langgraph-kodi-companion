[workspace]
name = "langgraph-automation"
version = "0.1.0"
description = "Conversational ReAct agent with MCP tool server — local LLM, LangGraph, LangSmith"
platforms = ["win-64"]
channels = ["conda-forge"]

[tasks]
install = { cmd = "python -m uv sync", cwd = "agent" }
install-server = { cmd = "npm install", cwd = "server" }
install-client = { cmd = "npm install", cwd = "client" }
install-all = { depends-on = ["install", "install-server", "install-client"] }

build = { cmd = "npm run build", cwd = "server" }
build-client = { cmd = "npm run build", cwd = "client" }
build-all = { depends-on = ["build", "build-client"] }

test = { cmd = "npm test", cwd = "server" }
test-agent = { cmd = "python -m uv run python -c \"from agent.graph import graph; from agent.llm import check_llm_reachable; from agent.tools import create_mcp_client, RetryPolicyInterceptor; print('agent OK')\"", cwd = "agent" }
test-all = { depends-on = ["test", "test-agent"] }

dev-server = { cmd = "npm run dev", cwd = "server" }
server = { depends-on = ["build"], cmd = "npm start", cwd = "server", description = "Build + start MCP server (production)" }
agent = { cmd = "python -m uv run langgraph dev --no-browser", cwd = "agent", description = "Start LangGraph API server (localhost only, :2024)" }
agent-for-kodi = { cmd = "python -m uv run langgraph dev --no-browser --host 0.0.0.0", cwd = "agent", description = "Start LangGraph API server (LAN accessible, :2024) for Kodi Companion app" }
agent-cli = { cmd = "python -m uv run python -m agent.main", cwd = "agent", description = "Run LangGraph agent CLI (use -- --thread <id>)" }

dev-client = { cmd = "npm run dev", cwd = "client" }
dev-all = { cmd = "powershell -NoProfile -Command \"Start-Process powershell -ArgumentList '-NoExit','-Command','cd server; npm run dev' ; Start-Process powershell -ArgumentList '-NoExit','-Command','cd agent; python -m uv run langgraph dev --no-browser' ; Start-Process powershell -ArgumentList '-NoExit','-Command','cd client; npm run dev'\"" }

lint = { cmd = "npm run build", cwd = "server" }
